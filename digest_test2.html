<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unencoded-Digest 精确测试</title>
    <style>/* 同上，略 */</style>
</head>
<body>
    <h1>检测 Unencoded-Digest</h1>
    <div id="output">正在运行测试...</div>
    <script>
        (async function() {
            const output = document.getElementById('output');
            function log(message, className = '') {
                const line = document.createElement('div');
                line.textContent = message;
                if (className) line.classList.add(className);
                output.appendChild(line);
            }

            try {
                const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
                log('✅ Service Worker 注册成功');
                await navigator.serviceWorker.ready;
                log('✅ Service Worker 已激活\n');
            } catch (e) {
                log('❌ Service Worker 注册失败: ' + e.message, 'fail');
                log('请确保 sw.js 存在且页面通过 HTTPS 访问。', 'fail');
                return;
            }

            async function testFetch(type, shouldPass) {
                const url = './special-test?type=' + type;
                try {
                    const res = await fetch(url);
                    const unencoded = res.headers.get('Unencoded-Digest');
                    const identity = res.headers.get('Identity-Digest');
                    log(`🔍 ${type} 头: Unencoded-Digest=${unencoded}, Identity-Digest=${identity}`);

                    if (res.ok) {
                        const text = await res.text();
                        if (shouldPass) {
                            log(`✅ ${type}: 成功`, 'pass');
                        } else {
                            log(`❌ ${type}: 成功（但应失败）`, 'fail');
                        }
                    } else {
                        log(`⚠️ ${type}: 状态码 ${res.status}`, 'fail');
                    }
                } catch (err) {
                    if (!shouldPass) {
                        log(`✅ ${type}: 失败（符合预期）: ${err.message}`, 'pass');
                    } else {
                        log(`❌ ${type}: 失败（但应成功）: ${err.message}`, 'fail');
                    }
                }
            }

            log('--- 测试 Unencoded-Digest ---');
            await testFetch('unencoded-match', true);
            await testFetch('unencoded-mismatch', false);

            log('\n--- 测试 Identity-Digest ---');
            await testFetch('identity-match', true);
            await testFetch('identity-mismatch', true);

            log('\n--- 无头对照 ---');
            await testFetch('none', true);

            log('\n✅ 测试完成。请根据实际输出判断。');
        })();
    </script>
</body>
</html>
